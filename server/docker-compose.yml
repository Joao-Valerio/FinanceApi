services:
  postgres:
    image: postgres:16-alpine
    container_name: financeapi-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: financeapi
      POSTGRES_PASSWORD: financeapi
      POSTGRES_DB: financeapi
    volumes:
      - financeapi_pgdata:/var/lib/postgresql/data

volumes:
  financeapi_pgdata:
